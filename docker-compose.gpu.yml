services:
  # ── API Server (production) ─────────────────────────────────────────
  hr-api:
    build: .
    container_name: hr-assessment-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Persist outputs between restarts
      - ./outputs:/app/outputs
      # Persist downloaded models (Whisper, MERaLiON) so they survive rebuilds
      - models_cache:/app/models_cache
      # Audio input folder (read-only)
      - ./audio:/app/audio:ro
      - "./Team Recordings:/app/Team Recordings:ro"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=cuda
      - EMOTION_DEVICE=cuda
      - EMOTION_BATCH_SIZE=${EMOTION_BATCH_SIZE:-0}
      - LANGUAGE_PROFILE=${LANGUAGE_PROFILE:-non_native_english}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    shm_size: 4g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── CLI Worker (batch processing) ───────────────────────────────────
  hr-worker:
    build: .
    container_name: hr-assessment-worker
    profiles: ["worker"]
    volumes:
      - ./outputs:/app/outputs
      - models_cache:/app/models_cache
      - ./audio:/app/audio:ro
      - "./Team Recordings:/app/Team Recordings:ro"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=cuda
      - EMOTION_DEVICE=cuda
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    shm_size: 4g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Override: run batch processing then exit
    # Usage: docker compose -f docker-compose.gpu.yml --profile worker run hr-worker python main.py "audio/interview.webm" --position "Developer"
    entrypoint: ["python", "main.py"]
    command: ["--help"]

volumes:
  models_cache:
    name: hr_assessment_models
