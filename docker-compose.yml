version: "3.8"

services:
  slim-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN}
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/models
      - EMOTION_DEVICE=cuda
      - EMOTION_GPU=0
      - EMOTION_BATCH_SIZE=0
      - LANGUAGE_PROFILE=non_native_english
    volumes:
      - model-cache:/models
      - ./outputs:/app/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  model-cache:
    name: slim-pipeline-models
